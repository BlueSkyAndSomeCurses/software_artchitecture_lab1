services:
  facade:
    build:
      context: .
      dockerfile: services/facade/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - config-server
      - kafka
    environment:
      RUST_LOG: info
      CONFIG_SERVER_URL: http://config-server:8083
      KAFKA_BROKERS: kafka:9092
      KAFKA_TRANSACTIONS_TOPIC: transactions

  messages:
    build:
      context: .
      dockerfile: services/messages/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - kafka
    environment:
      RUST_LOG: info
      DATABASE_URL: postgres://${POSTGRES_USER:-facade_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-facade_db}
      KAFKA_BROKERS: kafka:9092
      KAFKA_TRANSACTIONS_TOPIC: transactions
      KAFKA_CONSUMER_GROUP: messages-service-group

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-facade_db}
      POSTGRES_USER: ${POSTGRES_USER:-facade_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - facade-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  logging-1:
    build:
      context: .
      dockerfile: services/logging/Dockerfile
    expose:
      - "8082"
    environment:
      RUST_LOG: info
      REDIS_MASTER_NAME: mymaster
      REDIS_SENTINELS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy

  logging-2:
    build:
      context: .
      dockerfile: services/logging/Dockerfile
    expose:
      - "8082"
    environment:
      RUST_LOG: info
      REDIS_MASTER_NAME: mymaster
      REDIS_SENTINELS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy

  logging-3:
    build:
      context: .
      dockerfile: services/logging/Dockerfile
    expose:
      - "8082"
    environment:
      RUST_LOG: info
      REDIS_MASTER_NAME: mymaster
      REDIS_SENTINELS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy

  config-server:
    build:
      context: .
      dockerfile: services/config-server/Dockerfile
    ports:
      - "8083:8083"
    depends_on:
      - logging-1
      - logging-2
      - logging-3
      - messages
    environment:
      LOGGING_SERVICES: logging-1:8082,logging-2:8082,logging-3:8082
      MESSAGES_SERVICE: messages:8081
      KAFKA_BROKERS: kafka:9092
      KAFKA_TRANSACTIONS_TOPIC: transactions

  redis-1:
    image: bitnami/redis:latest
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-2:
    image: bitnami/redis:latest
    environment:
      - REDIS_REPLICATION_MODE=replica
      - REDIS_MASTER_HOST=redis-1
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      - redis-1
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-3:
    image: bitnami/redis:latest
    environment:
      - REDIS_REPLICATION_MODE=replica
      - REDIS_MASTER_HOST=redis-1
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      - redis-1
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-sentinel-1:
    image: bitnami/redis-sentinel:latest
    environment:
      - REDIS_MASTER_SET=mymaster
      - REDIS_MASTER_HOST=redis-1
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-sentinel-2:
    image: bitnami/redis-sentinel:latest
    environment:
      - REDIS_MASTER_SET=mymaster
      - REDIS_MASTER_HOST=redis-1
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-sentinel-3:
    image: bitnami/redis-sentinel:latest
    environment:
      - REDIS_MASTER_SET=mymaster
      - REDIS_MASTER_HOST=redis-1
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  facade-postgres-data:
