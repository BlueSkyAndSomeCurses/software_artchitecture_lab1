services:
  facade:
    build:
      context: .
      dockerfile: services/facade/Dockerfile
    ports:
      - "8080:8080"
    environment:
      RUST_LOG: info

  messages:
    build:
      context: .
      dockerfile: services/messages/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    environment:
      RUST_LOG: info
      DATABASE_URL: postgres://${POSTGRES_USER:-facade_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-facade_db}

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-facade_db}
      POSTGRES_USER: ${POSTGRES_USER:-facade_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - facade-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  logging-backend:
    build:
      context: .
      dockerfile: services/logging/Dockerfile
    expose:
      - "8082"
    deploy:
      replicas: 3
    environment:
      RUST_LOG: info
      REDIS_MASTER_NAME: mymaster
      REDIS_SENTINELS: redis-sentinel-1:26379,redis-sentinel-2:26379,redis-sentinel-3:26379
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      redis-1:
        condition: service_healthy
      redis-2:
        condition: service_healthy
      redis-3:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_healthy
      redis-sentinel-2:
        condition: service_healthy
      redis-sentinel-3:
        condition: service_healthy
      
  logging:
    image: nginx:alpine
    ports:
      - "8082:80" 
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - logging-backend

  redis-1:
    image: bitnami/redis:latest
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-2:
    image: bitnami/redis:latest
    environment:
      - REDIS_REPLICATION_MODE=replica
      - REDIS_MASTER_HOST=redis-1
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      - redis-1
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-3:
    image: bitnami/redis:latest
    environment:
      - REDIS_REPLICATION_MODE=replica
      - REDIS_MASTER_HOST=redis-1
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      - redis-1
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-sentinel-1:
    image: bitnami/redis-sentinel:latest
    environment:
      - REDIS_MASTER_SET=mymaster
      - REDIS_MASTER_HOST=redis-1
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-sentinel-2:
    image: bitnami/redis-sentinel:latest
    environment:
      - REDIS_MASTER_SET=mymaster
      - REDIS_MASTER_HOST=redis-1
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis-sentinel-3:
    image: bitnami/redis-sentinel:latest
    environment:
      - REDIS_MASTER_SET=mymaster
      - REDIS_MASTER_HOST=redis-1
      - REDIS_MASTER_PORT_NUMBER=6379
      - REDIS_MASTER_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    depends_on:
      - redis-1
      - redis-2
      - redis-3
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  facade-postgres-data:
