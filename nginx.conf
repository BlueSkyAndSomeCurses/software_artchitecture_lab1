events {}

http {
    upstream logging_cluster {
        server logging-backend:8082; 
    }

    server {
        listen 80;

        location / {
            proxy_pass http://logging_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            
            proxy_set_header Connection ""; 
            proxy_http_version 1.1;
        }
    }
}